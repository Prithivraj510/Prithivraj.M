    <script type="text/javascript">
        // Deconstruct React and Framer Motion Modules Globally
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        function App() {
            const [currentSlide, setCurrentSlide] = useState(1);
            const totalSlides = 6;

            // Keyboard Presentation Loop Controller Engine
            useEffect(() => {
                const handleKeyDown = (e) => {
                    const slides = document.querySelectorAll('[data-slide="true"]');
                    let targetIndex = null;

                    if (e.key === 'ArrowDown' || e.key === ' ') {
                        e.preventDefault();
                        const next = currentSlide + 1;
                        if (next <= totalSlides) targetIndex = next - 1;
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        const prev = currentSlide - 1;
                        if (prev >= 1) targetIndex = prev - 1;
                    }

                    if (targetIndex !== null && slides[targetIndex]) {
                        slides[targetIndex].scrollIntoView({ behavior: 'smooth' });
                        setCurrentSlide(targetIndex + 1);
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [currentSlide]);

            // Realtime Visibility Tracking Matrix Node
            useEffect(() => {
                const handleScroll = () => {
                    const slides = document.querySelectorAll('[data-slide="true"]');
                    const scrollPos = window.scrollY + window.innerHeight / 2;

                    slides.forEach((slide, index) => {
                        if (scrollPos >= slide.offsetTop && scrollPos < slide.offsetTop + slide.offsetHeight) {
                            setCurrentSlide(index + 1);
                        }
                    });
                };

                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
