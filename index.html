<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        /* Base styles matching configuration overrides */
        body {
            background-color: #09090B;
            color: #A1A1AA; /* zinc-400 */
        }
        
        .font-thin { font-weight: 100; }
        .font-light { font-weight: 300; }
        
        /* Custom text-tracking & writing-modes required by spec */
        .vertical-text {
            writing-mode: vertical-rl;
        }

        /* Custom Keyframe Animations for Scanners and Borders */
        @keyframes logo-scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .animate-logo-scan {
            animation: logo-scan 4.5s ease-in-out infinite;
        }

        @keyframes border-spin {
            100% { transform: rotate(360deg); }
        }
        .animate-border-spin {
            animation: border-spin 12s linear infinite;
        }

        @keyframes orbital-rotation {
            100% { transform: rotate(360deg); }
        }
        .animate-orbital-drift {
            animation: orbital-rotation 24s linear infinite;
        }

        /* Conic border gradient helper */
        .conic-cta-wrap {
            position: relative;
            background: #030303;
            padding: 1px;
            overflow: hidden;
            border-radius: 9999px;
        }
        .conic-cta-glow {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent 0%, #22D3EE 25%, transparent 50%, #22D3EE 75%, transparent 100%);
        }

        /* Seamless Marquee Track loop */
        @keyframes marquee-move {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            animation: marquee-move 20s linear infinite;
        }

        /* Prevent visibility flashing before GSAP overrides */
        .gsap-fade-up {
            opacity: 0;
            transform: translateY(40px);
        }
    </style>
</head>
