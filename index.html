<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M. Prithivraj | Aura Value Infrastructure Node</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Inter:wght@300;400;600&family=Geist+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: '#050505',
                        fgLight: '#F5F7FA',
                        primaryBlue: '#9ED8FF',
                        primaryMuted: '#171A1F',
                        accentGold: '#CFAE6E',
                        accentBlue: '#74C7FF',
                        borderDark: '#171A1F',
                        borderLight: '#232833',
                        textMuted: '#7D8794',
                        textDim: '#AEB8C6'
                    },
                    fontFamily: {
                        display: ['Michroma', 'sans-serif'],
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Geist Mono', 'monospace']
                    }
                }
            }
        }
    </script>

    <style>
        /* Global Scrollbar Customization */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: #171A1F;
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #7D8794;
        }

        /* Selection Overrides */
        ::selection {
            background: rgba(158, 216, 255, 0.15);
            color: #9ED8FF;
        }

        /* Animated Custom Borders via Conic Gradients */
        .conic-border-blue {
            position: relative;
            background: #050505;
            border: 1px solid transparent;
            background-clip: padding-box;
        }
        .conic-border-blue::before {
            content: '';
            position: absolute;
            top: -1px; bottom: -1px; left: -1px; right: -1px;
            z-index: -1;
            border-radius: inherit;
            background: conic-gradient(from 0deg at 50% 50%, #171A1F 0%, #9ED8FF 25%, #171A1F 50%, #74C7FF 75%, #171A1F 100%);
            animation: spinBorder 6s linear infinite;
        }

        .conic-border-gold {
            position: relative;
            background: #050505;
            border: 1px solid transparent;
            background-clip: padding-box;
        }
        .conic-border-gold::before {
            content: '';
            position: absolute;
            top: -1px; bottom: -1px; left: -1px; right: -1px;
            z-index: -1;
            border-radius: inherit;
            background: conic-gradient(from 180deg at 50% 50%, #171A1F 0%, #CFAE6E 35%, #171A1F 70%, #CFAE6E 100%);
            animation: spinBorder 8s linear infinite;
        }

        @keyframes spinBorder {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
