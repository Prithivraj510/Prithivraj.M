<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelCraft DJ | High-Performance Visual Audio Systems</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:wght=100..900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkbg: '#050505',
                        surface: '#09090b',
                        emeraldNeon: '#34d399',
                        violetNeon: '#a78bfa',
                        cyanNeon: '#22d3ee',
                        proofBg: '#d7ffe9',
                        proofText: '#07100b'
                    },
                    fontFamily: {
                        anton: ['Anton', 'sans-serif'],
                        sans: ['DM Sans', 'sans-serif'],
                        mono: ['Inter', 'monospace']
                    },
                    transitionTimingFunction: {
                        custom: 'cubic-bezier(0.16, 1, 0.3, 1)'
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom scrollbar override */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #22d3ee;
        }

        /* Selection styling */
        ::selection {
            background-color: rgba(52, 211, 153, 0.3);
            color: #34d399;
        }

        /* Global Structural Utilities */
        body {
            background-color: #050505;
            overflow-x: hidden;
        }

        .bg-texture {
            background-image: repeating-linear-gradient(-45deg, rgba(255, 255, 255, 0.015), rgba(255, 255, 255, 0.015) 1px, transparent 1px, transparent 10px);
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .gradient-text {
            background: linear-gradient(to right, #60a5fa, #ffffff, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Technical Corner Accent Lines */
        .corner-accent::before, .corner-accent::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            border-color: rgba(255, 255, 255, 0.2);
            border-style: solid;
            pointer-events: none;
        }
        .corner-accent-tl::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
        .corner-accent-tr::after { top: -1px; right: -1px; border-width: 1px 1px 0 0; }
        
        /* 3D Card Perspective Parent Setup */
        .perspective-frame {
            perspective: 1000px;
        }
    </style>
</head>
