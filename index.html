    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Specific fonts mapped to requirement */
        .font-dot {
            font-family: 'DotGothic16', sans-serif;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Grid Background pattern */
        .grid-bg {
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Custom Kanban horizontal scroll styling */
        .kanban-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .kanban-scroll::-webkit-scrollbar {
            height: 6px;
        }
        .kanban-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .kanban-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
        }

        /* Custom Intersection Observer Reveal System */
        .reveal {
            opacity: 0;
            filter: blur(10px);
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .reveal-left {
            opacity: 0;
            filter: blur(10px);
            transform: translateX(-40px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .reveal-right {
            opacity: 0;
            filter: blur(10px);
            transform: translateX(40px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .in-view {
            opacity: 1;
            filter: blur(0px);
            transform: translateY(0) translateX(0);
        }
    </style>
</head>
