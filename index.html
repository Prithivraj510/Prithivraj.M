<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINA | Synthesis is our Catalyst</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&family=JetBrains+Mono:wght@200;300&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #09090B;
            color: #A1A1AA; /* zinc-400 */
        }
        
        .font-thin { font-weight: 100; }
        .font-light { font-weight: 300; }
        
        /* Fixed layout container tracking to prevent letters collapsing into dot fragments */
        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        /* Scanners & Conic Shaders */
        @keyframes logo-scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .animate-logo-scan {
            animation: logo-scan 4.5s ease-in-out infinite;
        }

        @keyframes border-spin {
            100% { transform: rotate(360deg); }
        }
        .animate-border-spin {
            animation: border-spin 12s linear infinite;
        }

        @keyframes orbital-rotation {
            100% { transform: rotate(360deg); }
        }
        .animate-orbital-drift {
            animation: orbital-rotation 32s linear infinite;
        }

        .conic-cta-wrap {
            position: relative;
            background: #030303;
            padding: 1px;
            overflow: hidden;
            border-radius: 9999px;
        }
        .conic-cta-glow {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent 0%, #22D3EE 25%, transparent 50%, #22D3EE 75%, transparent 100%);
        }

        @keyframes marquee-move {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            animation: marquee-move 25s linear infinite;
        }

        /* Added structural line padding buffer to avoid browser line-clipping */
        .hero-line-container {
            padding-top: 4px;
            padding-bottom: 12px;
            overflow: hidden;
        }

        .gsap-fade-up {
            opacity: 0;
            transform: translateY(30px);
            will-change: transform, opacity;
        }
    </style>
</head>
